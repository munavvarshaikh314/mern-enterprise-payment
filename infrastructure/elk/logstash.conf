input {
  tcp {
    port => 5044
    codec => json
  }
  udp {
    port => 5044
    codec => json
  }
}

filter {
  if [type] == "nginx" {
    grok {
      match => { "message" => "%{COMBINEDAPACHELOG}" }
    }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "mern-logs-%{+YYYY.MM.dd}"
  }
  stdout { codec => rubydebug }
}