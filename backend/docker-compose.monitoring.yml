version: "3.8"

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: mern_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - mern-monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: mern_grafana
    ports:
      - "3001:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
    networks:
      - mern-monitoring

networks:
  mern-monitoring:
    driver: bridge